name: Review PR

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  # share the bonk-* group so /review and /bonk don't pile up on the same PR
  group: bonk-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  review:
    # mentions in this check must match the `mentions` input below.
    # For issue_comment events, require the comment to be on a PR (not an issue).
    if: >-
      github.event.sender.type != 'Bot'
      && contains(github.event.comment.body, '/review')
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      && (github.event_name != 'issue_comment' || github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr-number
        env:
          # issue_comment on a PR exposes the number via github.event.issue.number;
          # pull_request_review_comment exposes it via github.event.pull_request.number.
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Verify PR exists
        id: verify-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr-number.outputs.number }}
        run: |
          if gh api "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PR #${PR_NUMBER} not found, skipping review"
          fi

      - name: Checkout repository
        if: steps.verify-pr.outputs.exists == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup pnpm
        if: steps.verify-pr.outputs.exists == 'true'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        if: steps.verify-pr.outputs.exists == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.verify-pr.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Get PR details
        if: steps.verify-pr.outputs.exists == 'true'
        id: pr-details
        run: |
          gh api "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > /tmp/pr_data.json
          # Use heredoc form for every field — PR titles and bodies can contain
          # newlines that would otherwise corrupt $GITHUB_OUTPUT and let a PR
          # author smuggle arbitrary step outputs via their title/body.
          {
            echo 'title<<PR_TITLE_EOF'
            jq -r .title /tmp/pr_data.json
            echo PR_TITLE_EOF
            echo "sha=$(jq -r .head.sha /tmp/pr_data.json)"
            echo 'body<<PR_BODY_EOF'
            jq -r .body /tmp/pr_data.json
            echo PR_BODY_EOF
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr-number.outputs.number }}

      - name: Run Bonk
        if: steps.verify-pr.outputs.exists == 'true'
        uses: ask-bonk/ask-bonk/github@a96a0dc8f935aa38e71b33a473a8076738b53599 # main as of 2026-04-24
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          # Register kimi-k2.6 (released 2026-04-20) with the pinned opencode
          # version, whose bundled models.dev snapshot predates it and would
          # otherwise raise ProviderModelNotFoundError.
          OPENCODE_CONFIG_CONTENT: |
            {"provider":{"cloudflare-ai-gateway":{"models":{"workers-ai/@cf/moonshotai/kimi-k2.6":{"id":"workers-ai/@cf/moonshotai/kimi-k2.6","name":"Kimi K2.6","family":"kimi","attachment":true,"reasoning":true,"tool_call":true,"interleaved":{"field":"reasoning_content"},"temperature":true,"release_date":"2026-04-20","modalities":{"input":["text","image"],"output":["text"]},"cost":{"input":0.95,"output":4,"cache_read":0.16},"limit":{"context":256000,"output":256000}}}}}}
        with:
          model: "cloudflare-ai-gateway/workers-ai/@cf/moonshotai/kimi-k2.6"
          mentions: "/review"
          opencode_version: "1.4.6"
          permissions: write
          agent: reviewer
          prompt: |
            Review the following pull request (title: ${{ steps.pr-details.outputs.title }}) against the below review guidelines:

            Please check all the code changes in this pull request against the style guide, also look for any bugs if they exist. Diffs are important but make sure you read the entire file to get proper context. Make it clear the suggestions are merely suggestions and the human can decide what to do.

            Refer to AGENTS.md and any additional instructions for our style guide, conventions and repo-wide rules.

            1. Focus on actual violations and bugs. Where possible, comment on the exact line number to help guide the reviewer.
            2. Break up "needs fixing" (real logic bugs, poor error handling, security issues) vs. "suggestions" (nested logic, unused code, code structure/maintenance guidance) when responding so that a human has clear, actionable feedback.
            3. Use the gh cli to create comments on the files (or line numbers) where relevant. Use suggestions to suggest fixes, especially where you have high-confidence in the fix. Ensure fixes are valid code and take into account the surrounding code (opening/closing braces, indentation, comments). ALWAYS leave the final "review" comment empty.
            4. Your summary will be posted as a comment for you by OpenCode.

            In general, aim to provide actionable comments > code suggestions.

            <pr_number>
            ${{ steps.pr-number.outputs.number }}
            </pr_number>
            <pr_description>
            ${{ steps.pr-details.outputs.body }}
            </pr_description>

            If the PR looks good, respond with only "LGTM!". No need to pad your response if the PR passes review.
